name: Build release zip

# Reusable workflow: checks out a tag, builds the JS bundle, installs prod
# Composer deps (so the plugin-update-checker vendor/ ships), patches the
# version into style.css + functions.php + package.json, packs a version-less
# pediment-child-theme.zip via rsync + .distignore, and uploads it to the
# matching GitHub Release.
#
# Called from release-please.yml (automatic when release-please publishes a
# release) and release.yml (workflow_dispatch fallback for re-attaching).
#
# The asset filename is intentionally version-less so the GitHub download URL
# is stable (/releases/download/v<X.Y.Z>/pediment-child-theme.zip) and the
# theme's ThemeUpdater asset regex never needs updating per release.

on:
  workflow_call:
    inputs:
      tag:
        description: 'Release tag to build pediment-child-theme.zip for (e.g. v0.2.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  attach-zip:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag }}

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          tools: composer:v2
          coverage: none

      - name: Install Composer prod deps (PUC) into vendor/
        run: composer install --no-dev --optimize-autoloader --prefer-dist --no-progress

      - name: Build JS bundle
        run: |
          npm ci
          npm run build

      - name: Patch version into style.css, functions.php and package.json
        env:
          TAG: ${{ inputs.tag }}
        run: |
          VERSION="${TAG#v}"
          sed -i -E "s/^(Version:[[:space:]]+).+$/\1$VERSION/" style.css
          sed -i -E "s/(define\([[:space:]]*'PEDIMENT_CHILD_VERSION',[[:space:]]*')[^']*('[[:space:]]*\))/\1$VERSION\2/" functions.php
          VERSION="$VERSION" node -e "const p=require('./package.json');p.version=process.env.VERSION;require('fs').writeFileSync('package.json',JSON.stringify(p,null,2)+'\n');"
          grep -E "^Version:" style.css
          grep "PEDIMENT_CHILD_VERSION" functions.php
          grep '"version"' package.json

      - name: Build distributable zip
        run: |
          STAGE="$(mktemp -d)/pediment-child-theme"
          mkdir -p "$STAGE"
          rsync -a --exclude-from=.distignore ./ "$STAGE/"
          ( cd "$(dirname "$STAGE")" && zip -rq "$GITHUB_WORKSPACE/pediment-child-theme.zip" pediment-child-theme )
          unzip -l "pediment-child-theme.zip" | tail -5

      - name: Upload zip to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ inputs.tag }}
        run: gh release upload "$TAG" pediment-child-theme.zip --clobber
