name: CI

on:
  pull_request:
  push:
    branches: [main, development]

jobs:
  phpcs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          tools: composer
      - run: composer install --prefer-dist --no-progress
      - run: composer lint

  lint-js:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - run: npm run lint:js
      - run: npm run build

  phpunit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          path: pediment-child-theme
      - uses: actions/checkout@v6
        with:
          repository: Bergert-Digital/pediment
          ref: development
          token: ${{ secrets.STARTER_THEME_PAT }}
          path: pediment
      - uses: actions/checkout@v6
        with:
          repository: Bergert-Digital/pediment-ai
          ref: development
          token: ${{ secrets.STARTER_THEME_PAT }}
          path: pediment-ai
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: pediment-child-theme/package-lock.json
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          tools: composer
      - name: Build parent theme blocks
        run: cd pediment && npm ci && npm run build
      - name: Build plugin
        run: cd pediment-ai && composer install --prefer-dist --no-progress && npm ci && npm run build
      - name: Install child deps
        run: cd pediment-child-theme && composer install --prefer-dist --no-progress && npm ci
      - name: Point wp-env at locally-checked-out parent + plugin
        run: |
          cat > pediment-child-theme/.wp-env.override.json <<'JSON'
          { "themes": [".", "../pediment"], "plugins": ["../pediment-ai"] }
          JSON
      - name: Start wp-env
        run: cd pediment-child-theme && npm run env:start
      - name: Build child blocks
        run: cd pediment-child-theme && npm run build
      - name: Run PHPUnit
        run: cd pediment-child-theme && npx wp-env run tests-wordpress --env-cwd=wp-content/themes/pediment-child-theme vendor/bin/phpunit
      - if: always()
        run: cd pediment-child-theme && npm run env:stop

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          path: pediment-child-theme
      - uses: actions/checkout@v6
        with:
          repository: Bergert-Digital/pediment
          ref: development
          token: ${{ secrets.STARTER_THEME_PAT }}
          path: pediment
      - uses: actions/checkout@v6
        with:
          repository: Bergert-Digital/pediment-ai
          ref: development
          token: ${{ secrets.STARTER_THEME_PAT }}
          path: pediment-ai
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: pediment-child-theme/package-lock.json
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          tools: composer
      - run: cd pediment && npm ci && npm run build
      - run: cd pediment-ai && composer install --prefer-dist --no-progress && npm ci && npm run build
      - run: cd pediment-child-theme && npm ci
      - run: cd pediment-child-theme && npx playwright install --with-deps chromium
      - name: Point wp-env at locally-checked-out parent + plugin
        run: |
          cat > pediment-child-theme/.wp-env.override.json <<'JSON'
          { "themes": [".", "../pediment"], "plugins": ["../pediment-ai"] }
          JSON
      - run: cd pediment-child-theme && npm run env:start
      - run: cd pediment-child-theme && npm run build
      - run: cd pediment-child-theme && npx wp-env run cli wp theme activate pediment-child-theme
      - run: cd pediment-child-theme && npm run e2e
      - if: always()
        run: cd pediment-child-theme && npm run env:stop
      - if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: pediment-child-theme/playwright-report/
