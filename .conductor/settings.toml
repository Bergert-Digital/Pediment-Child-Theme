"$schema" = "https://conductor.build/schemas/settings.repo.schema.json"

[scripts]
# Install PHP + JS dependencies and build the child blocks so a freshly
# created workspace has a ready-to-run theme. No Docker here — kept fast and
# safe so creating a workspace never spins up wp-env. The final step is a
# no-op unless you opt in (PEDIMENT_LINK_LOCAL=1 in settings.local.toml): when
# on, it points wp-env at your local pediment / pediment-ai checkouts instead
# of the pinned release zips. See tools/link-local-deps.mjs.
setup = "composer install && npm install && npm run build && node tools/link-local-deps.mjs"

# Boot the wp-env WordPress stack (activates this child + seeds demo content,
# idempotent), then run the block watcher in the foreground for live rebuilds.
# wp-env uses the fixed ports from .wp-env.json (8890/8891) and the project is
# explicitly single-instance, so this is nonconcurrent.
run = "npm run env:setup && npm run start"
run_mode = "nonconcurrent"

# Stop this workspace's wp-env containers when archiving. `|| true` so a
# not-running env never blocks archival. Avoids `wp-env destroy` (interactive).
archive = "npm run env:stop || true"
